# =============================================================================
# Gitleaks Configuration
# Docs: https://github.com/gitleaks/gitleaks
# =============================================================================

title = "gitleaks config"

[extend]
# Use the default ruleset and extend it
useDefault = true

[[allowlists]]
description   = "Allow placeholder subscription IDs in tfvars comments"
regexTarget   = "line"
# Matches lines that are comments (start with #) — safe to ignore
regex         = '''^\s*#'''
